appId: com.quickx.app
productName: QuickX
copyright: Copyright © 2025

directories:
  output: release

files:
  - dist/**/*
  - assets/**/*
  - package.json

win:
  target:
    - target: nsis
      arch: [x64]
  icon: assets/icon.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: QuickX

asar: true

compression: normal

publish:
  provider: github
  owner: LJL0906
  repo: quickx

